const OLIST_TOKEN_KEY="fingroup_olist_token_legacy";

function OlistPanel({empresaId,empresaInfo}){
  const token=empresaInfo?.olist_token||"";
  const[step,setStep]=useState("idle");
  const[loading,setLoading]=useState(false);
  const[produtos,setProdutos]=useState([]);
  const[pedidos,setPedidos]=useState([]);
  const[selProd,setSelProd]=useState([]);
  const[selPed,setSelPed]=useState([]);
  const[msg,setMsg]=useState("");
  const[erro,setErro]=useState("");
  const[dataIni,setDataIni]=useState(new Date(Date.now()-30*86400000).toISOString().slice(0,10));
  const[dataFim,setDataFim]=useState(new Date().toISOString().slice(0,10));
  const[importLog,setImportLog]=useState([]);
  const SITUACAO={0:"Aberta",1:"Faturada",2:"Cancelada",3:"Aprovada",4:"Prep. Envio",5:"Enviada",6:"Entregue",7:"Pronto Envio",9:"Não Entregue"};

  const buscarProdutos=async()=>{
    if(!token){setErro("Configure o token Olist na empresa (🏢 Gerenciar empresas → Editar)");return;}
    if(!empresaId){setErro("Selecione uma empresa no menu lateral");return;}
    setLoading(true);setErro("");setMsg("Buscando produtos no Olist...");
    try{
      const olistUrl="https://api.tiny.com.br/public-api/v3/produtos?limit=100&situacao=A";
      const proxyUrl="https://corsproxy.io/?"+encodeURIComponent(olistUrl);
      const res=await fetch(proxyUrl,{headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"}});
      if(res.status===401){setErro("Token inválido. Atualize em 🏢 Gerenciar empresas.");setLoading(false);setMsg("");return;}
      if(res.ok){
        const data=await res.json();
        const itens=(data?.itens||[]).map(p=>({sku:p.sku||p.codigo||"",nome:p.nome||p.descricao||"Produto",custo:Number(p.precoCusto||0),preco_venda:Number(p.precoVenda||0),quantidade:Number(p.saldoEstoque||0),venda_dia:0,lead_time:7,estoque_minimo:5,fornecedor:"Olist"}));
        if(itens.length===0){setErro("Nenhum produto encontrado. Verifique o token e se há produtos ativos no Olist.");setLoading(false);setMsg("");return;}
        setProdutos(itens);setSelProd(itens.map((_,i)=>i));setStep("produtos");setMsg(itens.length+" produtos encontrados.");
      }else{
        const err=await res.json().catch(()=>({}));
        setErro("Erro ao buscar produtos: "+(err.error||res.status));
      }
    }catch(e){
      setErro("Erro de conexão: "+e.message+". Verifique se o token está correto.");
    }
    setLoading(false);
  };

  const buscarVendas=async()=>{
    if(!token||!empresaId)return;
    setLoading(true);setErro("");setMsg("Buscando pedidos no Olist...");
    try{
      const params=new URLSearchParams({limit:100,orderBy:"desc",dataInicial:dataIni,dataFinal:dataFim});
      // API v2 Olist — pedidos por período
      const olistUrl="https://api.tiny.com.br/api2/pedidos.pesquisa.php?token="+token+"&formato=json&dataInicial="+dataIni+"&dataFinal="+dataFim;
      const proxyUrl="https://corsproxy.io/?"+encodeURIComponent(olistUrl);
      const res=await fetch(proxyUrl);
      if(res.ok){
        const data=await res.json();
        if(data?.retorno?.status==="Erro"){
          const msg=data?.retorno?.erros?.[0]?.erro||"Erro";
          setErro("Olist retornou erro: "+msg);setLoading(false);setMsg("");return;
        }
        const rawPedidos=data?.retorno?.pedidos||[];
        const itens=rawPedidos.map(p=>{
          const pd=p.pedido||p;
          return{
            numeroPedido:pd.numero||pd.id||"",
            dataCriacao:pd.data_pedido||pd.dataPedido||dataFim,
            situacao:pd.situacao||pd.status||"",
            cliente:{nome:pd.nome_contato||pd.cliente?.nome||"Cliente"},
            valor:pd.valor||pd.total_pedido||"0",
            ecommerce:{canalVenda:pd.forma_envio||pd.canal||"Olist"}
          };
        });
        setPedidos(itens);setSelPed(itens.map((_,i)=>i));setStep("vendas");
        setMsg(itens.length+" pedidos encontrados.");
      }else{
        setErro("Erro ao buscar pedidos: "+res.status);
      }
    }catch(e){
      setErro("Erro de conexão: "+e.message);
    }
    setLoading(false);
  };

  const importarProdutos=async()=>{
    if(!empresaId)return;
    setLoading(true);setMsg("Importando produtos...");
    const logs=[];
    for(const i of selProd){const p=produtos[i];try{await DB.saveEstoque({...p,empresa_id:empresaId});logs.push("✅ "+p.nome+" ("+( p.sku||"sem SKU")+")");}catch{logs.push("❌ Erro: "+p.nome);}}
    setImportLog(logs);setLoading(false);setMsg(selProd.length+" produto(s) importados!");setStep("done");
  };

  const importarVendas=async()=>{
    if(!empresaId)return;
    setLoading(true);setMsg("Importando pedidos...");
    const logs=[];
    const existentes=await DB.receber(empresaId);
    const pedidosExist=new Set(existentes.map(c=>c.pedido).filter(Boolean));
    for(const i of selPed){
      const p=pedidos[i];const numPed="#"+p.numeroPedido;
      if(pedidosExist.has(numPed)){logs.push("⏭️ Já importado: "+numPed);continue;}
      const dt=new Date(p.dataCriacao||Date.now());dt.setDate(dt.getDate()+30);
      const status=p.situacao===6?"Recebido":p.situacao===2?"Cancelado":"Em aberto";
      try{await DB.saveReceber({empresa_id:empresaId,cliente:p.cliente?.nome||"Cliente Olist",pedido:numPed,vencimento:dt.toISOString().slice(0,10),valor:parseFloat(p.valor||0),status,origem:"Olist · "+(p.ecommerce?.canalVenda||"—")});logs.push("✅ Pedido "+numPed+" — "+(p.cliente?.nome||"Cliente")+" — R$ "+p.valor);}
      catch{logs.push("❌ Erro no pedido "+numPed);}
    }
    setImportLog(logs);setLoading(false);setMsg(selPed.length+" pedido(s) importados!");setStep("done");
  };

  const tog=(arr,set,i)=>set(prev=>prev.includes(i)?prev.filter(x=>x!==i):[...prev,i]);
  const selAll=(arr,set)=>set(arr.map((_,i)=>i));
  const clrAll=(set)=>set([]);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* HEADER */}
      <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:10,background:"#fff0cc",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🛒</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:"#111827"}}>Integração Olist ERP</div>
            <div style={{fontSize:12,color:C.gray}}>{empresaInfo?.nome?"Empresa: "+empresaInfo.nome:"Selecione uma empresa no menu lateral"}</div>
          </div>
          {token?<span style={{fontSize:11,padding:"3px 10px",borderRadius:100,background:C.greenL,color:"#166534",fontWeight:600}}>🔌 Token configurado</span>
               :<span style={{fontSize:11,padding:"3px 10px",borderRadius:100,background:C.amberL,color:"#92400e",fontWeight:600}}>⚠️ Sem token</span>}
        </div>
        {msg&&<div style={{marginTop:10,padding:"8px 12px",background:"#eff6ff",borderRadius:8,fontSize:12,color:C.blueDk}}>{msg}</div>}
        {erro&&<div style={{marginTop:10,padding:"8px 12px",background:C.redL,borderRadius:8,fontSize:12,color:C.red}}>⚠️ {erro}</div>}
      </div>

      {/* SEM TOKEN */}
      {!token&&(
        <div style={{background:C.amberL,border:"1px solid #fde68a",borderRadius:12,padding:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#92400e",marginBottom:8}}>⚠️ Token Olist não configurado para {empresaInfo?.nome||"esta empresa"}</div>
          <div style={{fontSize:12,color:"#92400e",display:"flex",flexDirection:"column",gap:3}}>
            <span>1. Vá em <strong>🏢 Gerenciar empresas</strong> no menu</span>
            <span>2. Clique em <strong>✏️ Editar</strong> na empresa desejada</span>
            <span>3. Cole o token Bearer no campo <strong>Token Olist</strong> e salve</span>
            <span>4. Volte aqui — o token é carregado automaticamente</span>
          </div>
        </div>
      )}

      {!empresaId&&<div style={{background:C.amberL,border:"1px solid #fde68a",borderRadius:12,padding:14,fontSize:12,color:"#92400e"}}>⚠️ Selecione uma empresa específica no menu lateral.</div>}

      {/* PRODUTOS */}
      <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,padding:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:step==="produtos"?14:0}}>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>📦 Importar produtos → Estoque</div>
            <div style={{fontSize:11,color:C.gray}}>SKU, nome, custo, preço de venda e quantidade</div>
          </div>
          <button onClick={buscarProdutos} disabled={loading||!token||!empresaId} style={{...btnP,opacity:!token||!empresaId?.5:1,whiteSpace:"nowrap"}}>
            {loading&&step==="produtos"?"Buscando...":"🔍 Buscar produtos"}
          </button>
        </div>
        {step==="produtos"&&produtos.length>0&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:12}}><strong>{produtos.length} produtos</strong> — selecione para importar:</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>selAll(produtos,setSelProd)} style={{...btnS,fontSize:11,padding:"4px 10px"}}>Todos</button>
                <button onClick={()=>clrAll(setSelProd)} style={{...btnS,fontSize:11,padding:"4px 10px"}}>Limpar</button>
              </div>
            </div>
            <div style={{maxHeight:260,overflowY:"auto",border:"1px solid #f3f4f6",borderRadius:8,marginBottom:12}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead style={{position:"sticky",top:0,background:"#f9fafb"}}>
                  <tr>{["","SKU","Nome","Custo","Preço Venda","Estoque"].map((h,i)=><th key={i} style={{textAlign:"left",padding:"8px 10px",color:C.gray,fontWeight:500,fontSize:11,borderBottom:"1px solid #e5e7eb"}}>{h}</th>)}</tr>
                </thead>
                <tbody>{produtos.map((p,i)=>{const sel=selProd.includes(i);return(
                  <tr key={i} onClick={()=>tog(produtos,setSelProd,i)} style={{borderBottom:"1px solid #f3f4f6",background:sel?"#eff6ff":"#fff",cursor:"pointer"}}>
                    <td style={{padding:"8px 10px"}}><div style={{width:16,height:16,borderRadius:4,border:sel?"none":"1.5px solid #d1d5db",background:sel?C.blue:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#fff",fontSize:10}}>✓</span>}</div></td>
                    <td style={{padding:"8px 10px",color:C.gray,fontFamily:"monospace",fontSize:11}}>{p.sku||"—"}</td>
                    <td style={{padding:"8px 10px",fontWeight:500,color:"#374151"}}>{p.nome}</td>

                    <td style={{padding:"8px 10px",color:C.green,fontWeight:600}}>{fmtBRL(p.preco_venda)}</td>
                    <td style={{padding:"8px 10px"}}>{p.quantidade} un.</td>
                  </tr>
                );})}</tbody>
              </table>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:12}}><strong>{selProd.length}</strong> selecionados</span>
              <button onClick={importarProdutos} disabled={loading||selProd.length===0} style={{...btnP,background:C.green,opacity:selProd.length===0?.5:1}}>
                {loading?"Importando...":"✅ Importar "+selProd.length+" produto(s)"}

            </div>
          </div>
        )}
      </div>

      {/* VENDAS */}
      <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,padding:16}}>

          <div><div style={{fontSize:11,color:C.gray,marginBottom:4}}>Data final</div><input type="date" value={dataFim} onChange={e=>setDataFim(e.target.value)} style={{...inp,width:145}}/></div>

                    <td style={{padding:"8px 10px",fontWeight:600,color:p.situacao===2?C.gray:C.green}}>{fmtBRL(p.valor)}</td>
                    <td style={{padding:"8px 10px"}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:100,background:sitColor+"20",color:sitColor,fontWeight:600}}>{sit}</span></td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:12}}><strong>{selPed.length}</strong> selecionados · Total: <strong style={{color:C.green}}>{fmtBRL(pedidos.filter((_,i)=>selPed.includes(i)).reduce((s,p)=>s+parseFloat(p.valor||0),0))}</strong></div>
              <button onClick={importarVendas} disabled={loading||selPed.length===0} style={{...btnP,background:C.green,opacity:selPed.length===0?.5:1}}>
                {loading?"Importando...":"✅ Importar "+selPed.length+" pedido(s)"}
              </button>
            </div>
          </div>
        )}
      </div>

      {/* LOG */}
      {step==="done"&&importLog.length>0&&(
        <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,padding:16}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>📋 Resultado da importação</div>
          <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {importLog.map((l,i)=><div key={i} style={{fontSize:12,padding:"4px 8px",borderRadius:6,background:l.startsWith("✅")?"#f0fdf4":l.startsWith("⏭️")?"#f9fafb":"#fff9f9",color:l.startsWith("✅")?"#166534":l.startsWith("⏭️")?C.gray:"#991b1b"}}>{l}</div>)}
          </div>
          <button onClick={()=>{setStep("idle");setProdutos([]);setPedidos([]);setImportLog([]);setMsg("");}} style={{...btnS,marginTop:12}}>🔄 Nova importação</button>
        </div>
      )}
    </div>
  );
}

        <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #f3f4f6"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#111827"}}>🏦 FinGroup</div>
          <div style={{fontSize:11,color:"#9ca3af",marginTop:1}}>Gestão financeira</div>
        </div>

        {/* Seletor empresa */}
        <div style={{padding:"10px 12px",borderBottom:"1px solid #f3f4f6"}}>
          <div style={{fontSize:10,color:"#9ca3af",fontWeight:600,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Empresa ativa</div>
          <button onClick={()=>setEmpresaAtiva("grupo")} style={{width:"100%",padding:"7px 10px",borderRadius:8,border:`1px solid ${isGrupo?C.blue:"#e5e7eb"}`,background:isGrupo?"#eff6ff":"#fff",color:isGrupo?C.blue:"#374151",fontSize:12,fontWeight:isGrupo?700:400,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
            <span style={{fontSize:14}}>🌐</span>
            <div><div style={{fontSize:12,lineHeight:1.2}}>Grupo Consolidado</div><div style={{fontSize:10,opacity:.7}}>{Object.keys(empresas).length} empresas</div></div>
          </button>
          {Object.values(empresas).map(emp=>{
            const at=empresaAtiva===emp.id;
            return(
              <button key={emp.id} onClick={()=>setEmpresaAtiva(emp.id)} style={{width:"100%",padding:"7px 10px",borderRadius:8,marginBottom:4,border:`1px solid ${at?emp.cor:"#e5e7eb"}`,background:at?emp.cor+"12":"#fff",color:at?emp.cor:"#374151",fontSize:12,fontWeight:at?700:400,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:14}}>{emp.icon}</span>
                <div><div style={{fontSize:12,lineHeight:1.2}}>{emp.nome}</div><div style={{fontSize:10,opacity:.6}}>{emp.cnpj||"—"}</div></div>
              </button>
            );
          })}
        </div>

        <nav style={{flex:1,padding:"8px 0"}}>
          {grupos.map(g=>(
            <div key={g}>
              <div style={{padding:"10px 14px 4px",fontSize:10,color:"#9ca3af",fontWeight:600,textTransform:"uppercase",letterSpacing:.8}}>{g}</div>
              {NAV.filter(n=>n.group===g).map(n=>(
                <button key={n.id} onClick={()=>setActive(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",fontSize:13,width:"100%",textAlign:"left",border:"none",cursor:"pointer",background:active===n.id?"#eff6ff":"transparent",color:active===n.id?C.blue:"#6b7280",fontWeight:active===n.id?600:400,borderLeft:active===n.id?`2px solid ${C.blue}`:"2px solid transparent",transition:"all .12s"}}>
                  <span style={{fontSize:15}}>{n.icon}</span>{n.label}
                </button>
              ))}
            </div>
          ))}
        </nav>

        {/* Info usuário */}
        <div style={{padding:"10px 14px",borderTop:"1px solid #f3f4f6",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:C.blueL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:C.blueDk,flexShrink:0}}>{usuario.nome?.[0]?.toUpperCase()}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{usuario.nome}</div><div style={{fontSize:10,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{usuario.email}</div></div>
          <button onClick={onLogout} title="Sair" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.gray}}>🚪</button>
        </div>
      </div>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* TOPBAR */}
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {empresaInfo&&<div style={{width:28,height:28,borderRadius:8,background:empresaInfo.cor+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{empresaInfo.icon}</div>}
            {isGrupo&&<div style={{width:28,height:28,borderRadius:8,background:"#ede9fe",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🌐</div>}
            <div>
              <span style={{fontSize:15,fontWeight:700,color:"#111827"}}>{cur?.icon} {cur?.label}</span>
              <span style={{marginLeft:8,fontSize:11,padding:"2px 8px",borderRadius:100,background:isGrupo?"#ede9fe":(empresaInfo?.cor+"15"),color:isGrupo?C.purple:empresaInfo?.cor,fontWeight:600}}>
                {isGrupo?"🌐 Grupo Consolidado":`${empresaInfo?.icon} ${empresaInfo?.nome}`}
              </span>
            </div>
          </div>
          {isGrupo&&active!=="dashboard"&&active!=="empresas"&&active!=="usuarios"&&(
            <div style={{fontSize:12,color:C.purple,background:"#ede9fe",padding:"6px 14px",borderRadius:8}}>
              🌐 Modo grupo — selecione uma empresa para editar
            </div>
          )}
        </div>

        {/* CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:24}} key={empresaAtiva+active}>
          {panels[active]||<Empty msg="Painel em construção"/>}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppWrapper/>);
</script>
</body>
</html>
